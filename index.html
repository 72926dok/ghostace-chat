<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostAce Chat</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; background: #e5ddd5; background-size: cover; height: 100vh; transition: 0.5s; }

        /* ၁။ Login Page Style (သီးသန့် စာမျက်နှာ) */
        #login-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; background: #075e54; color: white;
        }
        .login-box {
            background: white; padding: 40px; border-radius: 15px; width: 90%; max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); color: #333; text-align: center;
        }
        .login-box h2 { color: #075e54; margin-bottom: 20px; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; }
        .login-box button { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-login { background: #075e54; color: white; }
        .btn-signup { background: #25d366; color: white; }

        /* ၂။ Chat Page Style (သီးသန့် စာမျက်နှာ) */
        #chat-container { display: none; height: 100vh; flex-direction: column; }
        #header { background: #075e54; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px; border-radius: 10px; background: white; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-wrap: break-word; }
        .sent { align-self: flex-end; background: #dcf8c6; }
        .received { align-self: flex-start; }
        .typing { font-size: 0.8rem; color: #075e54; font-style: italic; padding: 5px 20px; min-height: 1.2rem; }
        .timestamp { font-size: 0.6rem; color: #888; display: block; text-align: right; margin-top: 5px; }
        .admin-btn { font-size: 10px; cursor: pointer; margin-left: 5px; }
        
        #input-bar { background: #f0f0f0; padding: 10px; display: flex; gap: 10px; }
        #input-bar input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ccc; outline: none; }
        #input-bar button { background: #075e54; color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-container">
    <div class="login-box">
        <h2>GhostAce Login</h2>
        <input type="email" id="login-email" placeholder="Email Address">
        <input type="password" id="login-pass" placeholder="Password">
        <button class="btn-login" onclick="handleLogin()">Login</button>
        <button class="btn-signup" onclick="handleSignup()">Create Account</button>
    </div>
</div>

<div id="chat-container">
    <div id="header">
        <strong>GhostAce Chat</strong>
        <div>
            <input type="file" id="wp-file" style="display:none" accept="image/*">
            <button onclick="document.getElementById('wp-file').click()">🖼️</button>
            <button onclick="logout()" style="background:#cc0000; color:white; border:none; padding:5px; border-radius:5px; margin-left:10px;">Logout</button>
        </div>
    </div>
    <div id="messages"></div>
    <div id="typing-box" class="typing"></div>
    <div id="input-bar">
        <input type="text" id="msg-text" placeholder="စာရိုက်ပါ...">
        <button onclick="send()">Send</button>
    </div>
</div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyB_IdBe27bNVBOh_cBlC-BRQrHdwHrznpE",
        authDomain: "demon-chat-20361.firebaseapp.com",
        databaseURL: "https://demon-chat-20361-default-rtdb.firebaseio.com",
        projectId: "demon-chat-20361",
        storageBucket: "demon-chat-20361.firebasestorage.app",
        messagingSenderId: "563979701938",
        appId: "1:563979701938:web:36a01ceb134f3e624ec3ab"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database(), admin = "thoonnz8888@gmail.com";

    // စာမျက်နှာနှစ်ခုကို ချိတ်ဆက်စစ်ဆေးခြင်း
    auth.onAuthStateChanged(user => {
        if (user) {
            const safeEmail = user.email.replace(/\./g, ',');
            db.ref('blockedUsers/' + safeEmail).on('value', s => {
                if (s.val()) { alert("Blocked!"); auth.signOut().then(() => location.reload()); }
                else {
                    document.getElementById('login-container').style.display = 'none';
                    document.getElementById('chat-container').style.display = 'flex';
                    startChat();
                }
            });
        } else {
            document.getElementById('login-container').style.display = 'flex';
            document.getElementById('chat-container').style.display = 'none';
        }
    });

    // Login & Signup
    function handleLogin() {
        auth.signInWithEmailAndPassword(document.getElementById('login-email').value, document.getElementById('login-pass').value).catch(e => alert(e.message));
    }
    function handleSignup() {
        auth.createUserWithEmailAndPassword(document.getElementById('login-email').value, document.getElementById('login-pass').value).then(() => alert("Success!")).catch(e => alert(e.message));
    }

    // Messaging & Admin Features
    function startChat() {
        db.ref('messages').on('value', snap => {
            const mBox = document.getElementById('messages');
            mBox.innerHTML = "";
            const currUser = auth.currentUser, isAdm = currUser && currUser.email === admin;
            snap.forEach(c => {
                const d = c.val(), k = c.key, isMe = currUser && d.sender === currUser.email;
                mBox.innerHTML += `<div class="msg ${isMe ? 'sent' : 'received'}">
                    <small style="color:#075e54; font-weight:bold;">${d.sender.split('@')[0]}</small>
                    ${isAdm ? `<span class="admin-btn" onclick="del('${k}')">🗑️</span>` : ''}
                    ${isAdm && d.sender !== admin ? `<span class="admin-btn" onclick="blk('${d.sender}')">🚫</span>` : ''}
                    <br>${d.text}<span class="timestamp">${d.time || ''}</span></div>`;
            });
            mBox.scrollTop = mBox.scrollHeight;
        });
    }

    function send() {
        const input = document.getElementById('msg-text');
        if (auth.currentUser && input.value.trim() !== "") {
            db.ref('messages').push({ sender: auth.currentUser.email, text: input.value, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) });
            input.value = "";
            db.ref('typing/' + auth.currentUser.uid).set({ isTyping: false });
        }
    }

    // Typing Status
    document.getElementById('msg-text').addEventListener('input', e => {
        if (auth.currentUser) db.ref('typing/' + auth.currentUser.uid).set({ email: auth.currentUser.email, isTyping: e.target.value.length > 0 });
    });
    db.ref('typing').on('value', snap => {
        let t = []; snap.forEach(c => { if (c.val().isTyping && c.val().email !== auth.currentUser?.email) t.push(c.val().email.split('@')[0]); });
        document.getElementById('typing-box').innerText = t.length > 0 ? t.join(', ') + " is typing..." : "";
    });

    function del(id) { if(confirm("Delete?")) db.ref('messages/' + id).remove(); }
    function blk(e) { if(confirm("Block " + e + "?")) db.ref('blockedUsers/' + e.replace(/\./g, ',')).set(true); }
    function logout() { auth.signOut().then(() => location.reload()); }
    
    // Wallpaper Recovery
    const savedBg = localStorage.getItem('chat_bg'); if (savedBg) document.body.style.backgroundImage = `url(${savedBg})`;
    document.getElementById('wp-file').onchange = e => {
        const r = new FileReader(); r.onload = () => { document.body.style.backgroundImage = `url(${r.result})`; localStorage.setItem('chat_bg', r.result); }; r.readAsDataURL(e.target.files[0]);
    };
</script>
</body>
</html>
